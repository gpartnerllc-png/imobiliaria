<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMOBI | Partner Holding Dashboard</title>
    <style>
        /* CONFIGURAÇÕES GERAIS E PALETA DE CORES PREMIUM (DARK) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            min-height: 100vh;
        }

        /* LAYOUT LATERAL (SIDEBAR) */
        .sidebar {
            width: 280px;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo-container {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #30363d;
        }

        .logo-container h1 {
            color: #58a6ff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo-container span {
            color: #8b949e;
            font-size: 12px;
        }

        /* SEÇÃO DE PERFIL NA SIDEBAR */
        .profile-box {
            background: #21262d;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border: 1px solid #30363d;
        }

        .avatar-container {
            width: 70px;
            height: 70px;
            background: #58a6ff;
            color: #0d1117;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 12px auto;
            border: 3px solid #30363d;
            overflow: hidden;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-box h3 {
            font-size: 15px;
            color: #f0f6fc;
            margin-bottom: 4px;
        }

        .profile-box p {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 8px;
        }

        .btn-config-perfil {
            color: #58a6ff;
            font-size: 12px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-config-perfil:hover {
            text-decoration: underline;
            color: #79c0ff;
        }

        /* CONTEÚDO PRINCIPAL */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            font-size: 20px;
            color: #f0f6fc;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 8px;
        }

        /* FORMULÁRIO DE CADASTRO/EDIÇÃO DE IMÓVEIS */
        .form-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 35px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #c9d1d9;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #f0f6fc;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #58a6ff;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-primary {
            background-color: #238636;
            color: #ffffff;
            border: 1px solid rgba(240,246,2fc,0.1);
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #2ea043;
        }

        /* PORTFÓLIO DE IMÓVEIS ATIVOS (GRID) */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 35px;
        }

        .imovel-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }

        .imovel-card:hover {
            transform: translateY(-4px);
            border-color: #444c56;
        }

        .card-img-container {
            width: 100%;
            height: 180px;
            background: #0d1117;
            position: relative;
        }

        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-modalidade {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #1f6feb;
            color: #fff;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
        }

        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #f0f6fc;
        }

        .card-price {
            font-size: 18px;
            font-weight: 700;
            color: #58a6ff;
        }

        .card-address {
            font-size: 12px;
            color: #8b949e;
        }

        .card-desc {
            font-size: 13px;
            color: #c9d1d9;
            line-height: 1.4;
        }

        .card-actions {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            background-color: #f1c40f;
            color: #0d1117;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            flex: 1;
            transition: opacity 0.2s;
        }

        .btn-edit:hover {
            opacity: 0.9;
        }

        /* PAINEL DE CONFIGURAÇÕES DE PERFIL */
        .profile-settings-panel {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 24px;
            margin-top: 20px;
        }

        .profile-btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: #30363d;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <h1>IMOBI</h1>
            <span>Partner Holding & Consulting</span>
        </div>

        <div class="profile-box">
            <div class="avatar-container" id="sidebarAvatar">
                C
            </div>
            <h3 id="sidebarNome">Cristian Ribeiro [Master]</h3>
            <p>Acesso Administrativo</p>
            <a class="btn-config-perfil" onclick="mostrarPainelPerfil()">⚙️ Configurar Conta</a>
        </div>
    </div>

    <div class="main-content">
        
        <h2 class="section-title" id="tituloFormulario">🏠 Publicar Novo Imóvel</h2>
        <div class="form-container">
            <div class="form-grid">
                <div class="form-group">
                    <label>Título do Anúncio:</label>
                    <input type="text" id="imovelTitulo" placeholder="Ex: Lote Comercial Águas Lindas">
                </div>
                <div class="form-group">
                    <label>Modalidade de Controle:</label>
                    <select id="imovelModalidade">
                        <option value="Contrato de Aluguel">Contrato de Aluguel</option>
                        <option value="Venda - Àgio">Venda - Àgio</option>
                        <option value="Venda Integral">Venda Integral</option>
                        <option value="Parceria SVA">Parceria SVA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Preço / Valor Comercial:</label>
                    <input type="text" id="imovelPreco" placeholder="Ex: R$ 2.500/mês ou R$ 150.000">
                </div>
                <div class="form-group">
                    <label>Localização / Endereço:</label>
                    <input type="text" id="imovelEndereco" placeholder="Cidade - UF">
                </div>
                <div class="form-group full-width">
                    <label>Link da Imagem/Foto (Aceita Link Direto do Google Drive):</label>
                    <input type="text" id="imovelFoto" placeholder="https://drive.google.com/drive/folders/1eyU735Bzq7VSjcnUMg0tZFb2-axfhBDk?usp=drive_link">
                </div>
                <div class="form-group full-width">
                    <label>Memorial Descritivo / Observações:</label>
                    <textarea id="imovelMemorial" placeholder="Escreva os detalhes técnicos, metas de entrega e condições jurídicas..."></textarea>
                </div>
            </div>
            <button class="btn-primary" id="btnSalvarImovel" onclick="executarAcaoImovel()">Publicar Anúncio no Portfólio</button>
        </div>

        <h2 class="section-title">📊 Portfólio de Imóveis Ativos</h2>
        <div class="portfolio-grid" id="containerPortfolio">
            </div>

        <div id="painelEditarPerfil" style="display: none;">
            <h2 class="section-title">⚙️ Configurações de Perfil da Conta</h2>
            <div class="profile-settings-panel">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome de Exibição:</label>
                        <input type="text" id="editNomePerfil" value="Cristian Ribeiro [Master]">
                    </div>
                    <div class="form-group">
                        <label>Foto de Perfil (Aceita Link do Google Drive):</label>
                        <input type="text" id="editFotoPerfil" placeholder="https://drive.google.com/file/d/1ThGL970mnQny2YKkgTdV7NSgBMl069Gg/view?usp=drive_link">
                    </div>
                    <div class="form-group">
                        <label>Nova Senha de Acesso:</label>
                        <input type="password" id="editSenhaPerfil" placeholder="Deixe em branco para não alterar">
                    </div>
                    <div class="form-group">
                        <label>Confirmar Nova Senha:</label>
                        <input type="password" id="editConfirmarSenhaPerfil" placeholder="Confirme a nova senha">
                    </div>
                </div>
                <div class="profile-btn-group">
                    <button class="btn-primary" onclick="salvarAlteracoesPerfil()">Salvar Alterações</button>
                    <button class="btn-secondary" onclick="document.getElementById('painelEditarPerfil').style.display='none'">Cancelar</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // BANCO DE DADOS EM MEMÓRIA (Com exemplos iniciais do seu ecossistema)
        let meuArrayDeImoveis = [
            {
                id: "1",
                titulo: "Lote Comercial Premium - Mansões Pôr do Sol",
                modalidade: "Venda Integral",
                preco: "R$ 180.000",
                endereco: "Águas Lindas de Goiás - GO",
                foto: "", // Vazio usará imagem padrão
                memorial: "Excelente lote comercial pronto para construção de galpões ou escritórios de logística corporativa."
            },
            {
                id: "2",
                titulo: "Sala Corporativa Partner Holding",
                modalidade: "Contrato de Aluguel",
                preco: "R$ 3.200/mês",
                endereco: "Distrito Federal - DF",
                foto: "",
                memorial: "Infraestrutura completa com suporte a servidores de alta performance e automações digitais."
            }
        ];

        // Variável de controle para verificar se estamos editando um imóvel existente
        let idImovelEmEdicao = null;

        // 1. FUNÇÃO UTILIÁRIA CRÍTICA: Converte links comuns de visualização do Google Drive em arquivos puros de renderização de imagem
        function converterLinkDrive(url) {
            if (!url) return '';
            
            // Regex avançado para capturar o ID único do arquivo no Google Drive
            const regex = /(?:\/d\/|id=)([\w-]+)/;
            const match = url.match(regex);
            
            if (match && match[1]) {
                const fileId = match[1];
                // Retorna a URL nativa de alta fidelidade para renderização de assets do ecossistema Google
                return `https://docs.google.com/uc?export=view&id=${fileId}`;
            }
            return url; // Se for um link web padrão ou direto, mantém inalterado
        }

        // 2. RENDERIZADOR DO PORTFÓLIO NA TELA
        function renderizarPortfolio() {
            const container = document.getElementById('containerPortfolio');
            container.innerHTML = ''; // Limpa antes de renderizar

            if (meuArrayDeImoveis.length === 0) {
                container.innerHTML = `<p style="color: #8b949e; grid-column: span 3; text-align: center; padding: 20px;">Nenhum imóvel ativo listado no momento.</p>`;
                return;
            }

            meuArrayDeImoveis.forEach(imovel => {
                // Passa o link salvo pela conversão do Drive antes de renderizar na tag img
                const imagemTratada = imovel.foto ? converterLinkDrive(imovel.foto) : 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=500&q=80';

                const cardHtml = `
                    <div class="imovel-card">
                        <div class="card-img-container">
                            <span class="badge-modalidade">${imovel.modalidade}</span>
                            <img src="${imagemTratada}" alt="Foto do Imóvel" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=500&q=80'">
                        </div>
                        <div class="card-body">
                            <h4 class="card-title">${imovel.titulo}</h4>
                            <div class="card-price">${imovel.preco}</div>
                            <div class="card-address">📍 ${imovel.endereco}</div>
                            <p class="card-desc">${imovel.memorial}</p>
                            <div class="card-actions">
                                <button class="btn-edit" onclick="abrirEdicaoImovel('${imovel.id}')">✏️ Editar Anúncio</button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // 3. LOGICA DO FORMULÁRIO DE ANÚNCIOS (SALVAR NOVO OU ALTERAR ALTERAÇÕES)
        function executarAcaoImovel() {
            const titulo = document.getElementById('imovelTitulo').value.trim();
            const modalidade = document.getElementById('imovelModalidade').value;
            const preco = document.getElementById('imovelPreco').value.trim();
            const endereco = document.getElementById('imovelEndereco').value.trim();
            const fotoRaw = document.getElementById('imovelFoto').value.trim();
            const memorial = document.getElementById('imovelMemorial').value.trim();

            if (!titulo || !preco) {
                alert("⚠️ Por favor, preencha pelo menos o Título e o Preço do anúncio.");
                return;
            }

            // Tratamento imediato do link do Drive na inserção
            const fotoProcessada = converterLinkDrive(fotoRaw);

            if (idImovelEmEdicao !== null) {
                // ATUALIZAR IMÓVEL EXISTENTE (Modo Correção Ativo)
                const index = meuArrayDeImoveis.findIndex(item => item.id === idImovelEmEdicao);
                if (index !== -1) {
                    meuArrayDeImoveis[index].titulo = titulo;
                    meuArrayDeImoveis[index].modalidade = modalidade;
                    meuArrayDeImoveis[index].preco = preco;
                    meuArrayDeImoveis[index].endereco = endereco;
                    meuArrayDeImoveis[index].foto = fotoProcessada;
                    meuArrayDeImoveis[index].memorial = memorial;
                    
                    alert("✔️ Anúncio corrigido e atualizado com sucesso!");
                }
                // Reseta estado do formulário
                idImovelEmEdicao = null;
                document.getElementById('tituloFormulario').innerText = "🏠 Publicar Novo Imóvel";
                document.getElementById('btnSalvarImovel').innerText = "Publicar Anúncio no Portfólio";
                document.getElementById('btnSalvarImovel').style.backgroundColor = "#238636";
            } else {
                // CRIAR NOVO ANÚNCIO
                const novoImovel = {
                    id: Date.now().toString(),
                    titulo: titulo,
                    modalidade: modalidade,
                    preco: preco,
                    endereco: endereco,
                    foto: fotoProcessada,
                    memorial: memorial
                };
                meuArrayDeImoveis.push(novoImovel);
                alert("✔️ Novo anúncio publicado com sucesso!");
            }

            // Limpa os campos do formulário
            limparFormularioImovel();
            // Atualiza o portfólio na tela
            renderizarPortfolio();
        }

        // CARREGA DADOS DO IMÓVEL DE VOLTA PARA O FORMULÁRIO DE EDIÇÃO
        function abrirEdicaoImovel(id) {
            const imovel = meuArrayDeImoveis.find(item => item.id === id);
            if (!imovel) return;

            idImovelEmEdicao = id;
            
            // Preenche os campos com os valores atuais para correção
            document.getElementById('imovelTitulo').value = imovel.titulo;
            document.getElementById('imovelModalidade').value = imovel.modalidade;
            document.getElementById('imovelPreco').value = imovel.preco;
            document.getElementById('imovelEndereco').value = imovel.endereco;
            document.getElementById('imovelFoto').value = imovel.foto;
            document.getElementById('imovelMemorial').value = imovel.memorial;

            // Altera visualmente o formulário sinalizando o modo de edição
            document.getElementById('tituloFormulario').innerText = "✏️ Corrigir e Editar Anúncio";
            const btnSalvar = document.getElementById('btnSalvarImovel');
            btnSalvar.innerText = "Salvar Alterações do Anúncio";
            btnSalvar.style.backgroundColor = "#e1b12c";

            // Rola suavemente para o formulário de edição
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function limparFormularioImovel() {
            document.getElementById('imovelTitulo').value = '';
            document.getElementById('imovelPreco').value = '';
            document.getElementById('imovelEndereco').value = '';
            document.getElementById('imovelFoto').value = '';
            document.getElementById('imovelMemorial').value = '';
        }

        // 4. SISTEMA DE GERENCIAMENTO E EDIÇÃO DE PERFIL
        function mostrarPainelPerfil() {
            const painel = document.getElementById('painelEditarPerfil');
            painel.style.display = 'block';
            // Rola até o painel de configurações
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function salvarAlteracoesPerfil() {
            const novoNome = document.getElementById('editNomePerfil').value.trim();
            const linkFotoRaw = document.getElementById('editFotoPerfil').value.trim();
            const novaSenha = document.getElementById('editSenhaPerfil').value;
            const confirmarSenha = document.getElementById('editConfirmarSenhaPerfil').value;

            // Validação de segurança para mudança de senha
            if (novaSenha !== '') {
                if (novaSenha !== confirmarSenha) {
                    alert("⚠️ Erro: A nova senha e a confirmação não conferem!");
                    return;
                }
            }

            // Atualização do Nome na interface
            if (novoNome) {
                document.getElementById('sidebarNome').innerText = novoNome;
            }

            // Tratamento e atualização de foto vinda do Google Drive para o perfil
            if (linkFotoRaw) {
                const fotoPerfilTratada = converterLinkDrive(linkFotoRaw);
                const sidebarAvatar = document.getElementById('sidebarAvatar');
                sidebarAvatar.innerHTML = `<img src="${fotoPerfilTratada}" alt="Avatar" onerror="this.parentElement.innerText='C'">`;
            }

            alert("✔️ Configurações de perfil e segurança salvas com sucesso!");
            document.getElementById('painelEditarPerfil').style.display = 'none';
        }

        // INICIALIZAÇÃO AUTOMÁTICA DO SISTEMA AO CARREGAR A PÁGINA
        window.onload = function() {
            renderizarPortfolio();
        };
    </script>
</body>
</html>
