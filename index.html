<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMOBI | Plataforma Imobiliária</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ====================== RESET GLOBAL ====================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeLegibility;
        }

        /* ====================== VARIÁVEIS DE TEMA ====================== */
        :root {
            --bg-base: #f4f6fa;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-glow: rgba(26, 115, 232, 0.1);
            --tesla-red: #e82127;
            --google-blue: #1a73e8;
            --google-green: #0f9d58;
            --google-yellow: #f4b400;
            --premium-gold: #b45309;
        }

        html[data-theme="dark"] {
            --bg-base: #060913;
            --bg-surface: #0c1220;
            --bg-card: #121b2d;
            --bg-input: #18253f;
            --text-main: #f5f7fa;
            --text-muted: #8a99ad;
            --border-glow: rgba(0, 240, 255, 0.15);
            --premium-gold: #ffd700;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        /* ====================== LAYOUT ====================== */
        .container { 
            max-width: 1400px; 
            margin: 2.5rem auto; 
            padding: 0 2rem; 
        }

        .grid-wrapper { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2.5rem;
            width: 100%;
        }

        /* ====================== HEADER ====================== */
        header { 
            background: rgba(255, 255, 255, 0.95);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        .brand-logo { 
            font-size: 1.8rem; 
            font-weight: 900; 
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-main) 20%, var(--google-blue) 70%, var(--tesla-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link { 
            background: transparent; 
            border: none; 
            color: var(--text-muted); 
            font-size: 0.95rem; 
            font-weight: 600; 
            cursor: pointer; 
            padding: 0.6rem 1.2rem; 
            border-radius: 8px; 
            transition: all 0.25s ease;
        }

        .nav-link:hover, .nav-link.active { 
            color: var(--text-main); 
            background: rgba(128, 128, 128, 0.1); 
        }

        .btn-action { 
            background: linear-gradient(135deg, var(--google-blue) 0%, #0c56be 100%);
            color: white;
            font-weight: 700;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(26, 115, 232, 0.2);
            transition: all 0.2s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 115, 232, 0.35);
        }

        /* ====================== CARDS ====================== */
        .card { 
            background: var(--bg-surface); 
            border: 1px solid rgba(128, 128, 128, 0.15); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--google-blue); 
            box-shadow: 0 20px 40px rgba(26, 115, 232, 0.1); 
        }

        .card-media-mock { 
            height: 240px; 
            background-color: #e2e8f0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden; 
        }

        /* ====================== MODAIS ====================== */
        .modal-blur { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.7); 
            -webkit-backdrop-filter: blur(12px); 
            backdrop-filter: blur(12px); 
            z-index: 5000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            padding: 1rem;
        }

        .modal-blur.active { 
            display: flex; 
        }

        .modal-window { 
            background: var(--bg-surface); 
            border: 1px solid rgba(128, 128, 128, 0.2); 
            border-radius: 24px; 
            width: 100%; 
            max-width: 750px; 
            padding: 2.5rem; 
            max-height: 90vh; 
            overflow-y: auto; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.2); 
        }

        /* ====================== RESPONSIVIDADE ====================== */
        @media (max-width: 1024px) {
            .grid-wrapper { 
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
                gap: 1.5rem; 
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
                text-align: center;
            }
            .grid-wrapper { 
                grid-template-columns: 1fr !important; 
            }
            .card-media-mock { height: 200px; }
            
            /* Tabela responsiva */
            table, thead, tbody, th, td, tr { 
                display: block; 
                width: 100%; 
            }
            thead { display: none; }
            tr { 
                margin-bottom: 1rem; 
                border: 1px solid rgba(128,128,128,0.2); 
                border-radius: 12px; 
                padding: 1rem; 
            }
            td { 
                text-align: right; 
                padding-left: 50%; 
                position: relative; 
            }
            td::before { 
                content: attr(data-label); 
                position: absolute; 
                left: 1rem; 
                font-weight: bold; 
                color: var(--text-muted); 
            }
        }

        @media (max-width: 480px) {
            .hero h1 { font-size: 2.2rem; }
            .card-media-mock { height: 180px; }
        }
    </style>
</head>
